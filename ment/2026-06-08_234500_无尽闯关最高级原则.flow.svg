<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">无尽闯关最高级原则流程图</title>
  <desc id="desc">展示启动、选择存档、选择角色、搭配永久道具、进入关卡、统一加速、通关保存和进入下一阶段的流程。</desc>
  <rect width="980" height="540" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .box { fill: #F8FAFC; stroke: #334155; stroke-width: 2; rx: 8; }
      .decision { fill: #FEF3C7; stroke: #92400E; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #374151; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .label { font-family: Arial, sans-serif; font-size: 14px; fill: #111827; text-anchor: middle; }
    </style>
  </defs>
  <text x="490" y="34" class="text">无尽闯关最高级原则流程</text>

  <rect x="60" y="80" width="160" height="64" class="box"/>
  <text x="140" y="112" class="text">启动游戏</text>

  <rect x="280" y="80" width="180" height="64" class="box"/>
  <text x="370" y="112" class="text">直接进无尽</text>

  <rect x="520" y="80" width="180" height="64" class="box"/>
  <text x="610" y="102" class="text">选择存档槽</text>
  <text x="610" y="126" class="small">至少 3 个</text>

  <rect x="760" y="80" width="160" height="64" class="box"/>
  <text x="840" y="102" class="text">选择角色</text>
  <text x="840" y="126" class="small">可沿用当前角色</text>

  <rect x="760" y="174" width="160" height="64" class="box"/>
  <text x="840" y="196" class="text">搭配永久道具</text>
  <text x="840" y="218" class="small">受阶段上限控制</text>

  <rect x="760" y="282" width="160" height="64" class="box"/>
  <text x="840" y="304" class="text">统一倍率运行</text>
  <text x="840" y="326" class="small">最高目标 10 倍</text>

  <polygon points="840,374 930,424 840,474 750,424" class="decision"/>
  <text x="840" y="424" class="text">是否通关</text>

  <rect x="500" y="392" width="210" height="64" class="box"/>
  <text x="605" y="414" class="text">保存进度收益</text>
  <text x="605" y="438" class="small">金币抽永久道具</text>

  <polygon points="370,374 470,424 370,474 270,424" class="decision"/>
  <text x="370" y="414" class="text">是否完成</text>
  <text x="370" y="438" class="text">10 关阶段</text>

  <rect x="60" y="392" width="180" height="64" class="box"/>
  <text x="150" y="414" class="text">进入下一阶段</text>
  <text x="150" y="438" class="small">开放换角重搭配</text>

  <rect x="750" y="486" width="180" height="40" class="box"/>
  <text x="840" y="506" class="text">保留既有进度</text>

  <path d="M220 112 H280" class="line"/>
  <path d="M460 112 H520" class="line"/>
  <path d="M700 112 H760" class="line"/>
  <path d="M840 144 V174" class="line"/>
  <path d="M840 238 V282" class="line"/>
  <path d="M840 346 V374" class="line"/>
  <path d="M750 424 H710" class="line"/>
  <text x="730" y="412" class="label">是</text>
  <path d="M500 424 H470" class="line"/>
  <path d="M270 424 H240" class="line"/>
  <text x="255" y="412" class="label">是</text>
  <path d="M150 392 V250 H760" class="line"/>
  <path d="M370 474 V506 H750" class="line"/>
  <text x="450" y="494" class="label">否，继续下一关</text>
  <path d="M840 474 V486" class="line"/>
  <text x="866" y="482" class="label">否</text>
  <path d="M840 486 V360 H930 V144" class="line"/>
</svg>
